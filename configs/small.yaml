# ceol-gpt small config — for ablation studies and quick experiments (~2M params)
# Suitable for any GPU including T4/L4

data_path: data/tunes.json
train_split: 0.85
val_split: 0.10
test_split: 0.05
max_seq_len: 512

model:
  d_model: 128
  n_heads: 4
  n_layers: 4
  d_ff: 512
  dropout: 0.1

training:
  batch_size: 128
  learning_rate: 3.0e-4
  weight_decay: 0.01
  max_epochs: 100
  warmup_steps: 200
  grad_clip: 1.0
  patience: 10

generation:
  temperature: 0.8
  top_k: 50
  top_p: 0.95
